name: Update Study Notes

on:
  schedule:
    # Runs at 10 AM EST (3 PM UTC) daily
    - cron: '0 15 * * *'
  
  workflow_dispatch:  # Manual trigger

jobs:
  update-notes:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
    
    - name: Update learning log
      run: |
        # Create learning_log.md if it doesn't exist
        if [ ! -f learning_log.md ]; then
          cat > learning_log.md << 'EOF'
        # 📚 Bioinformatics Learning Log

        Daily notes and study progress for MS in Bioinformatics @ Northeastern University.

        ## Topics Covered
        - Transcriptomics & RNA-seq Analysis
        - Single-cell RNA sequencing
        - Statistical Methods in Genomics
        - Computational Pipeline Development
        - Machine Learning in Biology

        ---
        ## Daily Log
        EOF
        fi
        
        # Study topics array
        TOPICS=(
          "Reviewed RNA-seq alignment methods (STAR vs HISAT2)"
          "Studied differential expression analysis with DESeq2"
          "Notes on scRNA-seq preprocessing with Scanpy"
          "Reviewed UMAP dimensionality reduction concepts"
          "Studied Leiden clustering algorithms"
          "Notes on batch effect correction methods"
          "Practiced Nextflow pipeline development"
          "Reviewed Python pandas data manipulation"
          "Studied R tidyverse functions"
          "Notes on Docker containerization for reproducibility"
          "Reviewed PCA mathematical foundations"
          "Studied multiple testing correction (FDR, Bonferroni)"
          "Notes on linear models in genomics"
          "Reviewed GWAS methodology and mixed models"
          "Studied pathway enrichment analysis (KEGG, GO)"
          "Notes on variant calling pipelines"
          "Transcriptomics lecture notes review"
          "Computational methods problem set work"
          "Statistics for bioinformatics concepts"
          "Bioinformatics programming exercises"
          "Reviewed Seurat single-cell workflow"
          "Studied scvi-tools latent space models"
          "Notes on featureCounts quantification"
          "Reviewed FastQC quality metrics"
          "Studied population structure analysis (PCA, DAPC)"
        )
        
        # Pick random topic
        RANDOM_INDEX=$((RANDOM % ${#TOPICS[@]}))
        TOPIC="${TOPICS[$RANDOM_INDEX]}"
        
        # Append entry
        echo "" >> learning_log.md
        echo "### $(date +'%B %d, %Y')" >> learning_log.md
        echo "- $TOPIC" >> learning_log.md
    
    - name: Commit and push
      run: |
        git config --local user.email "kulkarni.vedan@northeastern.edu"
        git config --local user.name "Vedant Kulkarni"
        git add learning_log.md
        
        if git diff --staged --quiet; then
          echo "No changes to commit"
        else
          MESSAGES=(
            "📚 Added study notes"
            "📖 Updated learning resources"
            "✏️ New notes added"
            "🧬 Updated bioinformatics notes"
            "📝 Study session update"
            "🔬 Added research notes"
          )
          MSG_INDEX=$((RANDOM % ${#MESSAGES[@]}))
          
          git commit -m "${MESSAGES[$MSG_INDEX]}"
          git push
        fi
