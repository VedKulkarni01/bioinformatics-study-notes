name: Update Study Notes

on:
  schedule:
    - cron: '0 15 * * *'
  workflow_dispatch:

jobs:
  update-notes:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        token: ${{ secrets.PAT_TOKEN }}
        persist-credentials: true
    
    - name: Update learning log
      run: |
        if [ ! -f learning_log.md ]; then
          cat > learning_log.md << 'EOF'
        # 📚 Bioinformatics Learning Log

        Daily notes and study progress for MS in Bioinformatics @ Northeastern University.

        ---
        ## Daily Log
        EOF
        fi
        
        TOPICS=(
          "Reviewed RNA-seq alignment methods (STAR vs HISAT2)"
          "Studied differential expression analysis with DESeq2"
          "Notes on scRNA-seq preprocessing with Scanpy"
          "Reviewed UMAP dimensionality reduction concepts"
          "Studied Leiden clustering algorithms"
          "Practiced Nextflow pipeline development"
          "Reviewed Python pandas data manipulation"
          "Studied R tidyverse functions"
          "Reviewed PCA mathematical foundations"
          "Studied multiple testing correction (FDR, Bonferroni)"
          "Reviewed GWAS methodology and mixed models"
          "Studied pathway enrichment analysis (KEGG, GO)"
          "Transcriptomics lecture notes review"
          "Statistics for bioinformatics concepts"
          "Reviewed Seurat single-cell workflow"
          "Studied scvi-tools latent space models"
          "Reviewed FastQC quality metrics"
        )
        
        RANDOM_INDEX=$((RANDOM % ${#TOPICS[@]}))
        TOPIC="${TOPICS[$RANDOM_INDEX]}"
        
        echo "" >> learning_log.md
        echo "### $(date +'%B %d, %Y')" >> learning_log.md
        echo "- $TOPIC" >> learning_log.md
    
    - name: Commit and push
      run: |
        git config user.email "kulkarni.vedan@northeastern.edu"
        git config user.name "Vedant Kulkarni"
        git remote set-url origin https://x-access-token:${{ secrets.PAT_TOKEN }}@github.com/VedKulkarni01/bioinformatics-study-notes.git
        git add learning_log.md
        git diff --staged --quiet || (git commit -m "📚 Added study notes" && git push)
